<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBC-Registraion</title>
    <link rel="stylesheet" href="./style2.css">
    <link rel="website icon" type="png" href="./image/Fitness Logo.png">

    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>

    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Felipa&family=Italianno&display=swap" rel="stylesheet">
</head>

<header>
    <div class="navbar">

        <div class="left">
            <a href="./index.html"><img src="./image/Fitness Logo.png" alt=""></a>
            <a href="./index.html"><h3 class="logo">Prime Body Ccompetition</h3></a>
        </div>
    
    </div>
</header>

<body>
    <section id="page1" class="active">
        <div class="page1">
            <h3 class="head">Register Now</h3>
            <p class="welco">Welcome to Prime Body ChampionShip</p>
            <div class="registration">

                <form action="">

                    <div class="a">

                        <div class="name">
                            <label for="">Name</label>
                            <input type="text" placeholder="Enter your name" required>
                        </div>

                        <div class="email">
                            <label for="">Eamil Id</label>
                            <input type="email" placeholder="enteryouremail@gmail.com" required>
                        </div>

                    </div>

                    <div class="b">
                        <div class="dob">
                            <label for="">Date of Birth</label>
                            <input type="date" placeholder="dd-mm-yy" required>
                        </div>

                        <div class="gender">
                            <label for="">Gender</label>
                            <select name="" id="">
                                <option value="">Gender</option>
                                <option value="">Male</option>
                                <option value="">Female</option>
                            </select>
                        </div>
                    
                    </div>

                    <div class="c">

                        <div class="category">
                            <label for="">Category</label>
                            <select name="" id="">
                                <option value="">Categories</option>
                                <option value="">Body Bulding</option>
                                <option value="">Men's Physique</option>
                                <option value="">Women Fitness</option>
                                <option value="">CrossFit</option>
                                <option value="">PowerLifting</option>
                            </select>
                        </div>

                        <div class="level">
                            <label for="">Level</label>
                            <select name="" id="">
                                <option value="">Level</option>
                                <option value="">Amature</option>
                                <option value="">Pro</option>
                            </select>
                        </div>

                    </div>

                    <div class="d">

                        <div class="weight">
                            <label for="">Weight</label>
                            <input type="number" placeholder="Enter your weight" required >
                        </div>

                        <div class="height">
                            <label for="">Height</label>
                            <input type="number" placeholder="Enter your height" required >
                        </div>

                    </div>
                </form>
                
                
            </div>
            <a href="./index3.html"><button class="register">Register</button></a>

            
        </div>
    </section>
</body>

</html>
