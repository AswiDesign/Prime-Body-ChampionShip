<body>
    
    <section id="page1" class="active">

                <form action="">

                    <div class="a">

                        <div class="name">
                            <label for="">Name</label>
                            <input type="text" name="name" id="name" placeholder="Enter Your Name" required>

                    </div>

                    <div class="b">

                        <div class="pin">
                            <label for="">Pincode</label>

                        </div>
                    
                    </div>

                    <div class="c">

                        <div class="phn">

                            <label for="">Phone Number</label>
                            <input type="number" name="address" id="address" placeholder="Mobile Number" required>
                        </div>

                        <div class="bank">
                            <label for="">Select Payment Type</label>
                            <select name="" id="">
                                <option value="">Select</option>
                                <option value="">Card</option>
                                <option value="">UPI App</option>
                            </select>
                        </div>

                    </div>
